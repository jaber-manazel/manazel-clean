<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>منازل الكرام</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

.login-box{
background:white;
padding:30px;
border-radius:12px;
width:320px;
box-shadow:0 0 15px rgba(0,0,0,.15);

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
box-sizing:border-box;
}

button{
cursor:pointer;
}

.dashboard{
display:none;
padding:30px;
}

.card{
background:white;
padding:20px;
margin-top:15px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="login-box" id="loginBox">

<h2>منازل الكرام</h2>

<input id="email"
placeholder="البريد الإلكتروني">

<input id="password"
type="password"
placeholder="كلمة المرور">

<button id="loginBtn">
دخول
</button>

<div id="result"></div>

</div>


<div class="dashboard" id="dashboard">

<h1>
لوحة نظام منازل الكرام
</h1>

<div class="card">
مرحبا <span id="userEmail"></span>
</div>

<div class="card">
الصلاحية:
<span id="userRole"></span>
</div>

<button onclick="logout()">
تسجيل خروج
</button>

</div>


<script>

const sb=supabase.createClient(
'https://ozyxvgohggpzowatypxi.supabase.co',
'sb_publishable_vYI4QILit4699jAmsZ-MbQ_-7KwSbMy'
);

document
.getElementById("loginBtn")
.addEventListener("click",login);


async function login(){

const email=
document.getElementById("email").value;

const password=
document.getElementById("password").value;

const result=
document.getElementById("result");

result.innerHTML="جاري الدخول...";

const {data,error}=
await sb.auth.signInWithPassword({

email,
password

});

if(error){

result.innerHTML=
"❌ "+error.message;

return;

}


const profile=
await sb
.from("profiles")
.select("*")
.eq("id",data.user.id)
.single();

document
.getElementById("loginBox")
.style.display="none";

document
.getElementById("dashboard")
.style.display="block";

document
.getElementById("userEmail")
.innerHTML=
data.user.email;

document
.getElementById("userRole")
.innerHTML=
profile.data.role;

}


async function logout(){

await sb.auth.signOut();

location.reload();

}

</script>

</body>
</html>
